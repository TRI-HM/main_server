# docker-compose.yml
# Deploy at: /var/www/wonderfarm/backend/
# Nginx runs on host, proxies API requests to app:9456
version: "3.8"

services:
  # Backend - Node Express API
  app:
    build: .
    container_name: wonderfarm_app
    ports:
      - "127.0.0.1:9456:9456"
    volumes:
      - ./uploads:/usr/src/app/public/images/uploads
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=main_server
      - DB_USERNAME=root
      - DB_PASSWORD=Admin123
      - DB_DIALECT=mysql
      - PORT=9456
      - NODE_OPTIONS=--max-old-space-size=512
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 384M
    command: >
      sh -c "sleep 15 && npm start"
    restart: unless-stopped

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: wonderfarm_db
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=Admin123
      - MYSQL_DATABASE=main_server
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-config.cnf:/etc/mysql/conf.d/custom.cnf:ro
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pAdmin123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # Uncomment to enable phpMyAdmin
  # phpmyadmin:
  #   image: phpmyadmin/phpmyadmin
  #   container_name: wonderfarm_phpmyadmin
  #   ports:
  #     - "127.0.0.1:8080:80"
  #   environment:
  #     PMA_HOST: db
  #     MYSQL_ROOT_PASSWORD: Admin123
  #   depends_on:
  #     - db
  #   restart: unless-stopped

volumes:
  mysql_data:

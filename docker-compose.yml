# docker-compose.yml
# This file is used to define and run multi-container Docker applications.
version: "3.8"

services:
  app:
    build: .
    ports:
      - "9456:9456" # Expose port 3000 of the app to port 9456 on the host
    volumes:
      - /home/mysql/upload/images:/usr/src/app/public/images/uploads
    env_file:
      - .env
    environment:
      - BASE_URL=http://171.244.143.124:9456
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=main_server
      - DB_USERNAME=root
      - DB_PASSWORD=Admin123
      - DB_DIALECT=mysql
      - PORT=9456
    depends_on:
      - db
    command: >
      sh -c "sleep 60 && npm start"

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=Admin123
      - MYSQL_DATABASE=main_server
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pAdmin123"]
      interval: 5s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin_container
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: Admin123
    depends_on:
      - db

volumes:
  mysql_data:

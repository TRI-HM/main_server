# docker-compose.yml
# This file is used to define and run multi-container Docker applications.
version: "3.8"

services:
  app:
    build: .
    ports:
      - "9456:9456"
    volumes:
      - /home/mysql/upload/images:/usr/src/app/public/images/uploads
    env_file:
      - .env
    environment:
      - BASE_URL=http://171.244.201.165:9456
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=main_server
      - DB_USERNAME=root
      - DB_PASSWORD=Admin123
      - DB_DIALECT=mysql
      - PORT=9456
      - NODE_OPTIONS=--max-old-space-size=1536
    depends_on:
      db:
        condition: service_healthy
    # Limit resources for 3GB RAM system
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    command: >
      sh -c "sleep 30 && npm start"
    restart: unless-stopped

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=Admin123
      - MYSQL_DATABASE=main_server
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-config.cnf:/etc/mysql/conf.d/custom.cnf:ro
    # Limit MySQL resources for 3GB RAM
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pAdmin123"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # phpmyadmin:
  #   image: phpmyadmin/phpmyadmin
  #   container_name: phpmyadmin_container
  #   restart: always
  #   ports:
  #     - "8080:80"
  #   environment:
  #     PMA_HOST: db
  #     MYSQL_ROOT_PASSWORD: Admin123
  #   depends_on:
  #     - db

volumes:
  mysql_data:

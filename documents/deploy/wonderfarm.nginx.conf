# Wonderfarm Nginx Configuration
# ──────────────────────────────────────────────────────────────────
# Directory:
#   /var/www/wonderfarm/
#   ├── frontend/
#   │   ├── main/    → wonderfarmsieusaothanhmat.com
#   │   └── demo/    → demo.wonderfarmsieusaothanhmat.com
#   └── backend/     → Shared API (Docker :9456)
# ──────────────────────────────────────────────────────────────────
#
# Install:
#   sudo mkdir -p /etc/nginx/snippets
#   sudo cp wonderfarm-common.conf /etc/nginx/snippets/
#   sudo cp wonderfarm.nginx.conf /etc/nginx/sites-available/wonderfarm
#   sudo ln -s /etc/nginx/sites-available/wonderfarm /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d wonderfarmsieusaothanhmat.com -d demo.wonderfarmsieusaothanhmat.com

# ─── Rate Limiting ───────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=static_limit:10m rate=50r/s;

# ─── Upstream Backend ────────────────────────────────────────────
upstream wonderfarm_backend {
    server 127.0.0.1:9456;
    keepalive 16;
}

# ═════════════════════════════════════════════════════════════════
# MAIN — wonderfarmsieusaothanhmat.com
# ═════════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name wonderfarmsieusaothanhmat.com www.wonderfarmsieusaothanhmat.com;

    root /var/www/wonderfarm/frontend/main;
    index index.html;

    # ─── Frontend ────────────────────────────────────────────
    location / {
        limit_req zone=static_limit burst=20 nodelay;
        try_files $uri $uri.html $uri/ /index.html;
    }

    location /_next/static/ {
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ─── Backend API ─────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://wonderfarm_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ─── Socket.io ───────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://wonderfarm_backend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─── Uploaded images ─────────────────────────────────────
    location /images/uploads/ {
        alias /var/www/wonderfarm/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    # ─── Common ──────────────────────────────────────────────
    include /etc/nginx/snippets/wonderfarm-common.conf;

    access_log /var/log/nginx/wonderfarm.access.log;
    error_log /var/log/nginx/wonderfarm.error.log warn;

    # ─── S3 Image Proxy (CORS bypass for canvas) ───────────────
    location /s3-proxy/ {
        proxy_pass https://s3-north1.viettelidc.com.vn/;
        proxy_http_version 1.1;
        proxy_set_header Host s3-north1.viettelidc.com.vn;
        proxy_set_header Connection "";
        proxy_ssl_server_name on;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=86400";

        expires 30d;
        access_log off;
    }

}


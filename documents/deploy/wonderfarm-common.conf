# /etc/nginx/snippets/wonderfarm-common.conf
# Shared config between main and demo server blocks

# ─── Gzip Compression ────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1000;
gzip_types
    text/plain
    text/css
    text/javascript
    application/json
    application/javascript
    application/xml
    application/xml+rss
    image/svg+xml
    font/woff2;

# ─── Security Headers ────────────────────────────────────────
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ─── Upload limit ────────────────────────────────────────────
client_max_body_size 20M;

# ─── Block dotfiles (except .well-known for SSL) ─────────────
location ~ /\.(?!well-known) {
    deny all;
    access_log off;
    log_not_found off;
}

# ─── Block common exploit paths ──────────────────────────────
location ~* (\.php|\.asp|\.aspx|\.jsp|\.cgi)$ {
    return 444;
}
